<p-card class="col-12">
    <p class="font-bold pb-3">Name</p>
    <div class="grid">
        <div class="col-12 md:col-4">
            <p-floatlabel>
                <p-datepicker styleClass="w-full" inputId="over_label" showIcon iconDisplay="input" />
                <label for="over_label">Date KYC Pack Prepared</label>
            </p-floatlabel>
        </div>
        <div class="col-12 md:col-4">
            <p-floatlabel>
                <p-datepicker styleClass="w-full" inputId="over_label" showIcon iconDisplay="input" />
                <label for="over_label">Date KYC  Sent to Mercuria</label>
            </p-floatlabel>
        </div>
        <div class="col-12 md:col-4">
            <p-floatlabel>
                <p-datepicker styleClass="w-full" inputId="over_label" showIcon iconDisplay="input" />
                <label for="over_label">Date KYC approval by Mercuria</label>
            </p-floatlabel>
        </div>
   
    </div>
</p-card>

<div class="flex justify-content-center flex-wrap">
    <div class="col-3">
        <p-button styleClass="w-full" class="col-4" label="Save" [rounded]="true" />
    </div>
</div>
